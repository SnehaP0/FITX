<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <link
    rel="stylesheet"
    href="style.css"/>
</head>
<body>
    <form action="/login" method="POST">
    <div class="bar">
    <a href="/index" class="butt">Home</a>
    <a href="/login" class="butt">Login in</a>
    <a href="/sign"class="butt">Sign in</a>
    <img src="Black Green Simple Fitness Logo.png" alt="FITX" class="logo">
    </div>
    <div class="page-center">
    <div class="login">
        <H2>Welcome Back</H2>
        <p> Login to continue</p>
        <div class="input">
            <label for="email">Email</label>
             <input type="email" id="email" placeholder="you@example.com" name="email">
        </div>
        <div class="input">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" name="password">
        </div>
        
          <button type="submit" class="butt">Log in</button>
         <div class="sp">
    Don't have an account?
    <a href="/sign" class="butt">Sign up</a>
    <a href="/index" class="butt">Home</a>
</div>
            
    </div>
</form>
    
</body>
</html>
